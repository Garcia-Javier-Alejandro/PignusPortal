<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pignus Portal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <img src="PignusLabs_Logo.png" alt="Pignus Labs logo" class="header__logo">
  </header>

  <main class="main">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar__heading"></div>
        <div class="sidebar__section">
          <div class="sidebar__section-title">Módulos</div>
          <ul class="sidebar__list">
            <li class="sidebar__item"><a href="https://facturacion.pignuslabs.com.ar/">Facturación</a></li>
            <li class="sidebar__item"><a href="https://inversiones.pignuslabs.com.ar/">Inversiones</a></li>
          </ul>
        </div>
      </aside>

      <section class="hero">
        <div class="hero__eyebrow">Bienvenido a Pignus Portal</div>
        <h1 class="hero__title">Landing page placeholder</h1>
        <p class="hero__description">Placeholder para el Portal Pignus. La sidebar contiene las aplicaciones en construcción.</p>
        <p class="hero__note">Contenido en construcción</p>
      </section>
    </div>
  </main>
</body>
</html>
